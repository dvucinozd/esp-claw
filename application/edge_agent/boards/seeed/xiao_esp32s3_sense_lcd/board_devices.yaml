version: 1.0.0
# Devices Configuration for XIAO ESP32S3 Sense + SPI LCD
devices:
  - name: camera
    type: camera
    sub_type: dvp
    version: default
    config:
      dvp_config:
        reset_io: -1
        pwdn_io: -1
        vsync_io: 38
        de_io: 47
        pclk_io: 13
        xclk_io: 10
        xclk_freq: 20000000
        data_width: CAM_CTLR_DATA_WIDTH_8
        data_io:
          data_io_0: 15
          data_io_1: 17
          data_io_2: 18
          data_io_3: 16
          data_io_4: 14
          data_io_5: 12
          data_io_6: 11
          data_io_7: 48
        # RGB565 works with built-in camera preview demo script.
        pixel_format: PIXFORMAT_RGB565
        frame_size: FRAMESIZE_VGA
        fb_count: 2
        fb_location: CAMERA_FB_IN_PSRAM
    peripherals:
      - name: i2c_master
        frequency: 100000

  - name: display_lcd
    chip: st7789
    type: display_lcd
    sub_type: spi
    version: default
    config:
      mirror_x: false
      mirror_y: true
      swap_xy: true
      invert_color: true
      x_max: 320
      y_max: 240
      io_spi_config:
        cs_gpio_num: 1
        dc_gpio_num: 7
        spi_mode: 0
        pclk_hz: 40000000
      lcd_panel_config:
        reset_gpio_num: 6
        data_endian: LCD_RGB_DATA_ENDIAN_BIG
        vendor_config: NULL
    peripherals:
      - name: spi_display

  - name: audio_adc
    chip: internal
    type: audio_codec
    version: default
    config:
      adc_enabled: true
      dac_enabled: false
      adc_max_channel: 1
      adc_channel_mask: "1"
      adc_channel_labels: ['MIC']
    peripherals:
      - name: i2s_pdm_mic

  - name: lcd_brightness
    type: ledc_ctrl
    version: default
    config:
      default_percent: 100
    peripherals:
      - name: ledc_backlight
