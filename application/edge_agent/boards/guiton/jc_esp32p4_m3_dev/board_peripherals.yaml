version: 1.0.0
peripherals:
  - name: i2c_master
    type: i2c
    role: master
    config:
      port: 0
      pins:
        sda: 7
        scl: 8

  - name: i2s_audio_out
    type: i2s
    format: "std-out"
    role: master
    config: &i2s_config
      port: 0
      sample_rate_hz: 48000
      clk_src: "I2S_CLK_SRC_DEFAULT"
      mclk_multiple: 256
      data_bit_width: 16
      slot_mode: "I2S_SLOT_MODE_STEREO"
      slot_mask: "I2S_STD_SLOT_BOTH"
      ws_width: 16
      pins:
        mclk: 13
        bclk: 12
        ws: 10
        dout: 9
        din: 48

  - name: i2s_audio_in
    type: i2s
    format: "std-in"
    role: master
    config: *i2s_config

  - name: gpio_pa_control
    type: gpio
    role: io
    config:
      pin: 11
      mode: GPIO_MODE_OUTPUT
      pull_up: false
      default_level: 0

  - name: ldo_mipi
    type: ldo
    config:
      # LDO channel powering the MIPI domain used by both DSI panel and CSI camera.
      # Keeping this shared avoids split power sequencing across two analog rails.
      chan_id: 3
      voltage_mv: 2500
      adjustable: 1
      owned_by_hw: 0

  - name: dsi_display
    type: dsi
    config:
      # DSI host 0 is the primary display path on this board design.
      bus_id: 0
      # Panel is wired in 2-lane DSI mode (not 4-lane).
      data_lanes: 2
      phy_clk_src: 0
      # Matches the current JD9365 timing profile used in board_devices.yaml.
      lane_bit_rate_mbps: 1500

  # This board family has two backlight control variants in vendor examples:
  # - GPIO23 via PWM (LEDC)
  # - I2C brightness controller at 0x45 reg 0x96
  # We keep LEDC as a generic default and can switch to I2C runtime control if needed.
  - name: ledc_backlight
    type: ledc
    version: default
    config:
      # PWM output routed to panel backlight transistor/input.
      gpio_num: 23
      # Low-speed mode is stable for backlight dimming and avoids extra clock pressure.
      speed_mode: LEDC_LOW_SPEED_MODE
      channel: 1
      timer_sel: 1
      # Start at 0; brightness device sets effective duty at runtime.
      duty: 0

  # RS485 demo wiring from vendor IDF examples (UART1: TX=26, RX=27)
  - name: uart_rs485
    type: uart
    config:
      uart_num: 1
      tx_io_num: 26
      rx_io_num: 27
      rts_io_num: -1
      cts_io_num: -1
      uart_mode: UART_MODE_RS485_HALF_DUPLEX
      use_queue: false
      intr_alloc_flags: 0
      rx_buffer_size: 256
      tx_buffer_size: 256
      uart_config:
        baud_rate: 115200
        data_bits: UART_DATA_8_BITS
        parity: UART_PARITY_DISABLE
        stop_bits: UART_STOP_BITS_1
        flow_ctrl: UART_HW_FLOWCTRL_DISABLE
        rx_flow_ctrl_thresh: 0
        source_clk: UART_SCLK_DEFAULT
        lp_source_clk: NULL
        flags:
          allow_pd: 0
          backup_before_sleep: 0
