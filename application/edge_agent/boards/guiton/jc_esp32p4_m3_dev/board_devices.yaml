version: 1.0.0
devices:
  - name: audio_dac
    chip: es8311
    type: audio_codec
    version: default
    config:
      dac_enabled: true
      dac_max_channel: 1
      dac_channel_mask: "1"
      mclk_enabled: true
    peripherals:
      - name: gpio_pa_control
        gain: 6
        active_level: 1
      - name: i2s_audio_out
      - name: i2c_master
        # Kept at 0x30 to match existing esp-claw/board-manager ES8311 configs.
        # Vendor Arduino samples also show 0x18 depending on driver address format.
        address: 0x30
        frequency: 400000

  - name: audio_adc
    chip: es8311
    type: audio_codec
    version: default
    config:
      adc_enabled: true
      adc_max_channel: 2
      adc_channel_mask: "11"
      adc_channel_labels: [RE, FC]
      mclk_enabled: true
    peripherals:
      - name: i2s_audio_in
      - name: i2c_master
        address: 0x30
        frequency: 400000

  - name: fs_sdcard
    type: fs_fat
    sub_type: sdmmc
    version: default
    config:
      sub_config:
        slot: SDMMC_HOST_SLOT_0
        frequency: SDMMC_FREQ_HIGHSPEED
        bus_width: 4
        # Slot0 uses dedicated SDMMC IO-mux pins configured by driver.
        # Vendor reference maps them to D0=39 D1=40 D2=41 D3=42 CMD=44 CLK=43.
        pins:
          clk: 0
          cmd: 0
          d0: 0
          d1: 0
          d2: 0
          d3: 0
          d4: 0
          d5: 0
          d6: 0
          d7: 0
        ldo_chan_id: 4

  - name: display_lcd
    chip: jd9365
    type: display_lcd
    sub_type: dsi
    # Display init is intentionally deferred; app can run headless without panel connected.
    # Real panel creation is handled by lcd_dsi_panel_factory_entry_t in setup_device.c.
    init_skip: true
    dependencies:
      # External panel driver component for JD9365 DSI panel.
      waveshare/esp_lcd_jd9365_10_1: "^1.0.3"
    config:
      # No reset GPIO routed from this board revision.
      reset_gpio_num: -1
      rgb_ele_order: LCD_RGB_ELEMENT_ORDER_RGB
      data_endian: LCD_RGB_DATA_ENDIAN_BIG
      # RGB565 path is selected to reduce memory bandwidth compared to RGB888.
      bits_per_pixel: 16
      reset_active_high: 0
      dbi_config:
        # Command channel over DSI virtual channel 0.
        virtual_channel: 0
        lcd_cmd_bits: 8
        lcd_param_bits: 8
      dpi_config:
        # Pixel stream channel over DSI virtual channel 0.
        virtual_channel: 0
        dpi_clk_src: MIPI_DSI_DPI_CLK_SRC_DEFAULT
        # 80 MHz pixel clock validated with current 800x1280 timing.
        dpi_clock_freq_mhz: 80
        pixel_format: LCD_COLOR_PIXEL_FORMAT_RGB565
        in_color_format: LCD_COLOR_FMT_RGB565
        out_color_format: LCD_COLOR_FMT_RGB565
        # Single framebuffer keeps memory use predictable on P4.
        num_fbs: 1
        flags:
          # DMA2D accelerates frame copy/fill for UI updates.
          use_dma2d: true
          # Keep low-power mode available for DSI link.
          disable_lp: false
        video_timing:
          h_size: 800
          v_size: 1280
          # Porch/pulse values aligned with vendor init profile for this panel.
          hsync_back_porch: 20
          hsync_pulse_width: 20
          hsync_front_porch: 40
          vsync_back_porch: 10
          vsync_pulse_width: 4
          vsync_front_porch: 30
    peripherals:
      - name: ldo_mipi
      - name: dsi_display

  - name: lcd_touch
    chip: gt911
    type: lcd_touch_i2c
    version: default
    # Like the display, touch init is deferred and goes through setup_device.c factory.
    init_skip: true
    dependencies:
      esp_lcd_touch:
        version: "*"
        require: public
      espressif/esp_lcd_touch_gt911: "*"
    config:
      io_i2c_config:
        # GT911 appears at 0x5D or 0x14 depending on INT/RESET strap at boot.
        dev_addr: [0x5D, 0x14]
        lcd_cmd_bits: 16
        scl_speed_hz: 100000
        peripherals:
          - name: i2c_master
      touch_config:
        # Logical touch space matches LCD native orientation.
        x_max: 800
        y_max: 1280
        # No dedicated reset/interrupt lines connected on this board profile.
        rst_gpio_num: -1
        int_gpio_num: -1
        levels:
          reset: 0
          interrupt: 0
        flags:
          # Keep identity transform here; app can rotate in UI layer if needed.
          swap_xy: false
          mirror_x: false
          mirror_y: false

  - name: lcd_brightness
    type: ledc_ctrl
    version: default
    # Logical brightness device bound to LEDC PWM backlight peripheral.
    peripherals:
      - name: ledc_backlight

  - name: camera
    type: camera
    version: default
    sub_type: "csi"
    dependencies:
      espressif/esp_video: "^2.0.0"
      espressif/esp_cam_sensor: "*"
    config:
      csi_config:
        # Connector mapping (from board docs):
        # - MIPI CSI lanes/clock: dedicated CSI hardware pins (not regular GPIOs)
        # - SCCB/I2C: SDA=GPIO7, SCL=GPIO8 via i2c_master peripheral
        reset_io: -1
        pwdn_io: -1
        dont_init_ldo: true
    peripherals:
      - name: i2c_master
        frequency: 100000
      - name: ldo_mipi
