version: 1.0.0
devices:
  - name: audio_dac
    chip: es8311
    type: audio_codec
    version: default
    config:
      dac_enabled: true
      dac_max_channel: 1
      dac_channel_mask: "1"
      mclk_enabled: true
    peripherals:
      - name: gpio_pa_control
        gain: 6
        active_level: 1
      - name: i2s_audio_out
      - name: i2c_master
        address: 0x30
        frequency: 400000

  - name: audio_adc
    chip: es8311
    type: audio_codec
    version: default
    config:
      adc_enabled: true
      adc_max_channel: 2
      adc_channel_mask: "11"
      adc_channel_labels: [RE, FC]
      mclk_enabled: true
    peripherals:
      - name: i2s_audio_in
      - name: i2c_master
        address: 0x30
        frequency: 400000

  - name: fs_sdcard
    type: fs_fat
    sub_type: sdmmc
    version: default
    config:
      sub_config:
        slot: SDMMC_HOST_SLOT_0
        frequency: SDMMC_FREQ_HIGHSPEED
        bus_width: 4
        pins:
          clk: 0
          cmd: 0
          d0: 0
          d1: 0
          d2: 0
          d3: 0
          d4: 0
          d5: 0
          d6: 0
          d7: 0
        ldo_chan_id: 4

  - name: display_lcd
    chip: ek79007
    type: display_lcd
    sub_type: dsi
    dependencies:
      espressif/esp_lcd_ek79007: "^1.0.0"
    config:
      reset_gpio_num: -1
      rgb_ele_order: LCD_RGB_ELEMENT_ORDER_RGB
      data_endian: LCD_RGB_DATA_ENDIAN_BIG
      bits_per_pixel: 16
      reset_active_high: 0
      dbi_config:
        virtual_channel: 0
        lcd_cmd_bits: 8
        lcd_param_bits: 8
      dpi_config:
        virtual_channel: 0
        dpi_clk_src: MIPI_DSI_DPI_CLK_SRC_DEFAULT
        dpi_clock_freq_mhz: 60
        pixel_format: LCD_COLOR_PIXEL_FORMAT_RGB565
        in_color_format: LCD_COLOR_FMT_RGB565
        out_color_format: LCD_COLOR_FMT_RGB565
        num_fbs: 1
        flags:
          use_dma2d: true
          disable_lp: false
        video_timing:
          h_size: 800
          v_size: 1280
          hsync_back_porch: 140
          hsync_pulse_width: 40
          hsync_front_porch: 40
          vsync_back_porch: 16
          vsync_pulse_width: 4
          vsync_front_porch: 16
    peripherals:
      - name: ldo_mipi
      - name: dsi_display

  - name: lcd_brightness
    type: ledc_ctrl
    version: default
    peripherals:
      - name: ledc_backlight

  - name: camera
    type: camera
    version: default
    sub_type: "csi"
    config:
      csi_config:
        reset_io: -1
        pwdn_io: -1
        dont_init_ldo: true
    peripherals:
      - name: i2c_master
        frequency: 100000
      - name: ldo_mipi
